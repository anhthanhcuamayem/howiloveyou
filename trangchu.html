<!-- trangchu.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="trangchu.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
    
    <!-- Login Form -->
    <div id="loginContainer" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 w-full max-w-md shadow-2xl border border-white/20">
            <div class="text-center mb-8">
                <i class="ri-admin-line text-6xl text-white mb-4"></i>
                <h2 class="text-3xl font-bold text-white">Admin Login</h2>
                <p class="text-gray-300 mt-2">Vui lòng đăng nhập để tiếp tục</p>
            </div>
            <form id="loginForm">
                <div class="mb-6">
                    <label class="block text-white mb-2">Tài khoản</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Nhập tài khoản">
                </div>
                <div class="mb-6">
                    <label class="block text-white mb-2">Mật khẩu</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Nhập mật khẩu">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all duration-300 transform hover:scale-105">Đăng nhập</button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardContainer" class="hidden min-h-screen">
        <!-- Header -->
        <div class="bg-white/10 backdrop-blur-lg border-b border-white/20 sticky top-0 z-50">
            <div class="container mx-auto px-6 py-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <i class="ri-dashboard-line text-3xl text-white"></i>
                        <h1 class="text-2xl font-bold text-white">Admin Dashboard</h1>
                    </div>
                    <button id="logoutBtn" class="bg-red-500/20 hover:bg-red-500 text-red-300 hover:text-white px-5 py-2 rounded-xl transition-all duration-300 flex items-center gap-2">
                        <i class="ri-logout-box-line"></i>
                        Đăng xuất
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="container mx-auto px-6 py-8">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-white mb-2">Chào mừng Admin!</h2>
                <p class="text-gray-300">Quản lý các công cụ và trang của bạn</p>
            </div>
            <div id="toolsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Cards sẽ được render bằng JavaScript -->
            </div>
        </div>
    </div>

    <script src="trangchu.js"></script>
</body>
</html>
